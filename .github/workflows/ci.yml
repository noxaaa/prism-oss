name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.4
      - run: go test ./...
      - run: npm --workspace apps/web test
      - run: npm --workspace apps/web run build
        env:
          APP_NAME: "OSS Control Console"
          BETTER_AUTH_SECRET: "ci-only-better-auth-secret-32-bytes"
          BETTER_AUTH_URL: "http://localhost:3000"
          DATABASE_URL: ":memory:"
          NEXT_PUBLIC_PRISM_EDITION: "oss"
