name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io/noxaaa

jobs:
  build-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cross-compile Go binaries
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          commit="${GITHUB_SHA}"
          build_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-X github.com/noxaaa/prism-oss/pkg/core/buildinfo.Version=${version} -X github.com/noxaaa/prism-oss/pkg/core/buildinfo.Commit=${commit} -X github.com/noxaaa/prism-oss/pkg/core/buildinfo.BuildTime=${build_time}"
          assets_dir=".release/assets"
          mkdir -p "$assets_dir" .release/docker/data
          touch .release/docker/data/.keep
          cp scripts/install.sh "$assets_dir/install.sh"
          cp scripts/uninstall.sh "$assets_dir/uninstall.sh"
          cp scripts/install-node-agent.sh "$assets_dir/install-node-agent.sh"
          cp scripts/uninstall-node-agent.sh "$assets_dir/uninstall-node-agent.sh"
          cp scripts/install-monitor-agent.sh "$assets_dir/install-monitor-agent.sh"
          cp scripts/uninstall-monitor-agent.sh "$assets_dir/uninstall-monitor-agent.sh"
          cp scripts/upgrade.sh "$assets_dir/upgrade.sh"
          for arch in amd64 arm64; do
            out_dir=".release/docker/linux-${arch}"
            mkdir -p "$out_dir"
            GOOS=linux GOARCH="$arch" CGO_ENABLED=0 go build -ldflags "$ldflags" -o "$out_dir/control-plane-oss" ./cmd/control-plane-oss
            GOOS=linux GOARCH="$arch" CGO_ENABLED=0 go build -ldflags "$ldflags" -o "$out_dir/migrate" ./cmd/migrate
            GOOS=linux GOARCH="$arch" CGO_ENABLED=0 go build -ldflags "$ldflags" -o "$out_dir/node-agent" ./cmd/node-agent
            GOOS=linux GOARCH="$arch" CGO_ENABLED=0 go build -ldflags "$ldflags" -o "$out_dir/monitor-agent" ./cmd/monitor-agent
            mkdir -p "$out_dir/dataplane/haproxy"
            container="prism-haproxy-${arch}-${GITHUB_RUN_ID}"
            docker create --platform "linux/${arch}" --name "$container" haproxy:3.0-alpine >/dev/null
            trap 'docker rm "$container" >/dev/null 2>&1 || true' EXIT
            docker cp "$container:/usr/local/sbin/haproxy" "$out_dir/dataplane/haproxy/haproxy.bin"
            mkdir -p "$out_dir/dataplane/haproxy/rootfs/usr"
            docker cp "$container:/lib" "$out_dir/dataplane/haproxy/rootfs/lib"
            docker cp "$container:/usr/lib" "$out_dir/dataplane/haproxy/rootfs/usr/lib"
            docker rm "$container" >/dev/null
            trap - EXIT
            printf '%s\n' \
              '#!/bin/sh' \
              'set -eu' \
              'dir=$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)' \
              'loader=$(find "$dir/rootfs/lib" -maxdepth 1 -name '\''ld-musl-*.so.1'\'' | head -n 1)' \
              'exec "$loader" --library-path "$dir/rootfs/lib:$dir/rootfs/usr/lib" "$dir/haproxy.bin" "$@"' \
              > "$out_dir/dataplane/haproxy/haproxy"
            chmod 0755 "$out_dir/dataplane/haproxy/haproxy" "$out_dir/dataplane/haproxy/haproxy.bin"
            cp "$out_dir/control-plane-oss" "$assets_dir/control-plane-oss-linux-${arch}"
            tar -C "$out_dir" -czf "$assets_dir/node-agent-linux-${arch}.tar.gz" node-agent dataplane
            tar -C "$out_dir" -czf "$assets_dir/monitor-agent-linux-${arch}.tar.gz" monitor-agent
            tar -czf "$assets_dir/migrate-linux-${arch}.tar.gz" -C "$out_dir" migrate -C "$GITHUB_WORKSPACE" migrations/auth migrations/core
          done
          (cd "$assets_dir" && sha256sum * > SHA256SUMS)

      - uses: actions/upload-artifact@v4
        with:
          name: go-release
          path: .release
          include-hidden-files: true

  build-web-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-runtime@v3

      - name: Build and push web image
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          docker buildx build --push --platform linux/amd64,linux/arm64 \
            -f apps/web/Dockerfile \
            --cache-from type=gha,scope=prism-oss-web \
            --cache-to type=gha,mode=max,scope=prism-oss-web \
            -t "${REGISTRY}/prism-oss-web:${version}" \
            -t "${REGISTRY}/prism-oss-web:latest" \
            .

  publish-web-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@noxaaa"

      - name: Publish web core package
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          npm ci --no-audit --no-fund
          npm version --workspace packages/web-core "${version}" --no-git-tag-version --allow-same-version
          if npm view "@noxaaa/prism-oss-web-core@${version}" version >/dev/null 2>&1; then
            echo "@noxaaa/prism-oss-web-core@${version} is already published; skipping."
            exit 0
          fi
          npm publish --workspace packages/web-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-control-plane-image:
    runs-on: ubuntu-latest
    needs: build-go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: go-release
          path: .release

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-runtime@v3

      - name: Build and push control-plane image
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          docker buildx build --push --platform linux/amd64,linux/arm64 \
            -f Dockerfile.control-plane \
            --cache-from type=gha,scope=prism-oss-control-plane \
            --cache-to type=gha,mode=max,scope=prism-oss-control-plane \
            -t "${REGISTRY}/prism-oss-control-plane:${version}" \
            -t "${REGISTRY}/prism-oss-control-plane:latest" \
            .

  build-migrate-image:
    runs-on: ubuntu-latest
    needs: build-go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: go-release
          path: .release

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-runtime@v3

      - name: Build and push migrate image
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          docker buildx build --push --platform linux/amd64,linux/arm64 \
            -f Dockerfile.migrate \
            --cache-from type=gha,scope=prism-oss-migrate \
            --cache-to type=gha,mode=max,scope=prism-oss-migrate \
            -t "${REGISTRY}/prism-oss-migrate:${version}" \
            -t "${REGISTRY}/prism-oss-migrate:latest" \
            .

  github-release:
    runs-on: ubuntu-latest
    needs:
      - build-go
      - build-web-image
      - publish-web-core
      - build-control-plane-image
      - build-migrate-image
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: go-release
          path: .release

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Prebuilt GHCR images and release binaries are published for this tag.
          files: |
            .release/assets/install.sh
            .release/assets/uninstall.sh
            .release/assets/upgrade.sh
            .release/assets/install-node-agent.sh
            .release/assets/uninstall-node-agent.sh
            .release/assets/install-monitor-agent.sh
            .release/assets/uninstall-monitor-agent.sh
            .release/assets/node-agent-linux-amd64.tar.gz
            .release/assets/node-agent-linux-arm64.tar.gz
            .release/assets/monitor-agent-linux-amd64.tar.gz
            .release/assets/monitor-agent-linux-arm64.tar.gz
            .release/assets/control-plane-oss-linux-amd64
            .release/assets/control-plane-oss-linux-arm64
            .release/assets/migrate-linux-amd64.tar.gz
            .release/assets/migrate-linux-arm64.tar.gz
            .release/assets/SHA256SUMS
